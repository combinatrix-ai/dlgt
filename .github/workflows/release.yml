name: dlgt-release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-dlgt:
    name: Build dlgt (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            builder: cargo
          - os: macos-latest
            target: x86_64-apple-darwin
            builder: cargo
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            builder: cargo-zigbuild
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            builder: cargo-zigbuild
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            builder: cargo-zigbuild
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            builder: cargo-zigbuild

    steps:
      - name: Check out dlgt
        uses: actions/checkout@v4

      - name: Install Rust toolchain for dlgt
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Validate dlgt release version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(cargo pkgid --package dlgt | sed -E 's/.*#([^@]+@)?//')"
          test "$tag_version" = "$package_version" || {
            echo "dlgt tag $GITHUB_REF_NAME does not match Cargo package version $package_version" >&2
            exit 1
          }

      - name: Install Zig for dlgt Linux cross-builds
        if: matrix.builder == 'cargo-zigbuild'
        shell: bash
        run: |
          set -euo pipefail
          zig_arch="$(case "$(uname -m)" in
            x86_64|amd64) echo x86_64 ;;
            aarch64|arm64) echo aarch64 ;;
            *) echo "unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac)"
          zig_os="$(case "$(uname -s)" in
            Linux) echo linux ;;
            Darwin) echo macos ;;
            *) echo "unsupported runner OS: $(uname -s)" >&2; exit 1 ;;
          esac)"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            "https://ziglang.org/download/0.15.2/zig-${zig_arch}-${zig_os}-0.15.2.tar.xz" \
            | tar -xJ -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/zig-${zig_arch}-${zig_os}-0.15.2" >> "${GITHUB_PATH}"

      - name: Install cargo-zigbuild for dlgt Linux cross-builds
        if: matrix.builder == 'cargo-zigbuild'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build and package dlgt
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.builder }}" = "cargo-zigbuild" ]; then
            cargo zigbuild --release --locked --target "${{ matrix.target }}" --bin dlgt
          else
            cargo build --release --locked --target "${{ matrix.target }}" --bin dlgt
          fi

          archive="dlgt-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          staging="${RUNNER_TEMP}/dlgt-package-${{ matrix.target }}"
          rm -rf "$staging"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/dlgt" "$staging/dlgt"
          chmod 755 "$staging/dlgt"
          tar -C "$staging" -czf "$archive" dlgt

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi

      - name: Upload dlgt package
        uses: actions/upload-artifact@v4
        with:
          name: dlgt-${{ matrix.target }}
          path: |
            dlgt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            dlgt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish-dlgt:
    name: Publish dlgt GitHub Release
    runs-on: ubuntu-latest
    needs: build-dlgt

    steps:
      - name: Download dlgt packages
        uses: actions/download-artifact@v4
        with:
          pattern: dlgt-*
          merge-multiple: true

      - name: Create dlgt checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          sha256sum dlgt-"${tag}"-*.tar.gz > "dlgt-${tag}-checksums.txt"

      - name: Publish dlgt GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dlgt-*
